<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- White background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#ffffff"/>

  <!-- Thin border — inset by 1px so stroke never clips -->
  <rect
    x="1.5" y="1.5"
    width="29" height="29"
    rx="5.5" ry="5.5"
    fill="none"
    stroke="#1a1916"
    stroke-width="1"
  />

  <!-- LB monogram -->
  <text
    x="16" y="22"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-weight="900"
    font-size="15"
    fill="#1a1916"
    letter-spacing="-0.5"
  >LB</text>

</svg>
